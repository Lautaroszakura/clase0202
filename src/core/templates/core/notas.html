<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="font-size: larger;color: deepskyblue;text-align: center;">
        <h1>Notas</h1>
        <p>{{notas}}</p> 
        <!--En vez de poner todas las notas en forma de lista, se puede hacer con un for -->
        {% for nota in notas %}
            <p>{{nota}}</p> 
        {% endfor %}
        <!--Se puede poner condicionales como-->
        {% for nota in notas %}
            {% if nota>=7 %}
                <p style="color: green;">{{nota}}</p>
            {% else %}
                <p style="color: red ;">{{nota}}</p>
            {% endif %}
        {% endfor %}
    </div>
</body>
</html>
